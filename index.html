    toast_&&ce("div",{style:{position:"fixed",bottom:16,right:16,background:"#1A1A2E",color:"#fff",padding:"11px 18px",borderRadius:10,fontSize:13,zIndex:9999,animation:"fU .2s",maxWidth:340,lineHeight:1.4,boxShadow:"0 4px 20px rgba(0,0,0,.25)"}},toast_),
    agentTask&&ce(AgentModal,{task:agentTask,onClose:()=>setAT(null),toast})
  )
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
