<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Café Matinal — Vasco</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#F7F4EE;color:#1C1C1C;min-height:100vh}
header{background:#1C1C1C;color:#F7F4EE;padding:20px 32px;display:flex;justify-content:space-between;align-items:center}
.greeting{font-size:22px;font-weight:600;letter-spacing:-0.3px}
.sub-greeting{font-size:13px;color:#A0A0A0;font-family:'Courier New',monospace;margin-top:2px}
.hbtn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:#F7F4EE;padding:7px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:0.3px;text-decoration:none;display:inline-flex;align-items:center;gap:5px}
.body{padding:24px 32px;max-width:960px;margin:0 auto}
.section-title{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:#888;margin-bottom:12px;font-family:'Courier New',monospace}
.cal-grid{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:28px}
.cal-card{background:#fff;border:1px solid #E8E4DB;border-radius:8px;padding:10px 16px;min-width:180px;border-left:3px solid #C0392B}
.cal-time{font-size:12px;color:#888;font-family:'Courier New',monospace;margin-bottom:2px}
.cal-title{font-size:14px;font-weight:500}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat{background:#fff;border:1px solid #E8E4DB;border-radius:10px;padding:14px 16px;text-align:center}
.stat-num{font-size:26px;font-weight:700;line-height:1.1}
.stat-label{font-size:11px;color:#888;font-family:'Courier New',monospace;margin-top:4px}
.group{margin-bottom:22px}
.group-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.group-dot{width:10px;height:10px;border-radius:50%}
.group-label{font-size:13px;font-weight:600;letter-spacing:0.5px}
.group-count{font-size:11px;color:#aaa;font-family:'Courier New',monospace;margin-left:auto}
.task-card{background:#fff;border:1px solid #E8E4DB;border-radius:10px;padding:14px 18px;margin-bottom:8px;display:flex;align-items:flex-start;gap:14px}
.task-left{flex:1;min-width:0}
.task-name{font-size:15px;font-weight:500;margin-bottom:4px;line-height:1.35}
.task-name a{color:inherit;text-decoration:none}
.task-name a:hover{text-decoration:underline}
.task-meta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;font-family:'Courier New',monospace}
.task-date{font-size:11px;color:#888;font-family:'Courier New',monospace}
.task-right{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;align-items:center}
.icon-btn{background:none;border:1px solid #E0DDD6;border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:#555;font-family:inherit}
.icon-btn:hover{background:#F2F0EA}
.agent-btn{background:#1C1C1C;color:#F7F4EE;border:none;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;letter-spacing:0.3px}
.agent-btn:hover{background:#333}
.done-btn{background:#1E8449;color:#fff;border:none;border-radius:6px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.done-btn:hover{background:#196A3A}
.task-card.done{opacity:0.4;pointer-events:none}
.overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;z-index:1000;padding:24px}
.overlay.active{display:flex}
.modal{background:#F7F4EE;border-radius:14px;padding:28px 32px;width:100%;max-width:560px}
.modal-title{font-size:18px;font-weight:600;margin-bottom:6px}
.modal-sub{font-size:13px;color:#888;margin-bottom:20px;font-family:'Courier New',monospace}
textarea{width:100%;min-height:90px;background:#fff;border:1px solid #DDD;border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;resize:vertical;outline:none}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0 20px}
.chip{background:#fff;border:1px solid #DDD;border-radius:20px;padding:5px 12px;font-size:12px;cursor:pointer;font-family:inherit}
.chip:hover{background:#EEE}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:16px}
.cancel-btn{background:none;border:1px solid #DDD;border-radius:8px;padding:9px 20px;font-size:13px;cursor:pointer;font-family:inherit}
.submit-btn{background:#1C1C1C;color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;cursor:pointer;font-family:inherit;letter-spacing:0.3px}
.ai-result{background:#fff;border:1px solid #E8E4DB;border-radius:8px;padding:14px 16px;margin-top:16px;font-size:14px;line-height:1.6;white-space:pre-wrap;max-height:280px;overflow-y:auto}
.toast{position:fixed;bottom:24px;right:24px;background:#1C1C1C;color:#fff;padding:12px 20px;border-radius:8px;font-size:13px;z-index:2000;font-family:'Courier New',monospace;transition:opacity 0.3s}
.toast.hide{opacity:0}
.source-note{font-size:11px;color:#bbb;font-family:'Courier New',monospace;text-align:right;margin-top:8px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}.body{padding:16px}.header-right{display:none}}
</style>
</head>
<body>
<header>
  <div>
    <div class="greeting" id="greeting">Bom dia, Vasco ☀</div>
    <div class="sub-greeting" id="today-date"></div>
  </div>
  <div style="display:flex;gap:10px" class="header-right">
    <button class="hbtn" onclick="loadTasks()">↻ Atualizar</button>
  </div>
</header>
<div class="body">
  <div id="calendar-section"></div>
  <div class="stats" id="stats"></div>
  <div id="tasks-container"></div>
  <div class="source-note" id="source-note"></div>
</div>
<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-title">✦ Agente Livre</div>
    <div class="modal-sub" id="modal-sub"></div>
    <textarea id="prompt-input" placeholder="Ex: Resume o estado desta tarefa e sugere próximo passo..."></textarea>
    <div class="chips" id="chips"></div>
    <div id="ai-result-box"></div>
    <div class="modal-btns">
      <button class="cancel-btn" onclick="closeModal()">Fechar</button>
      <button class="submit-btn" id="submit-btn" onclick="submitAgent()">Executar + enviar email</button>
    </div>
  </div>
</div>
<div class="toast hide" id="toast"></div>

<script>
const WEBHOOK = "https://hook.eu1.make.com/77msmctjelcxsi2zss5yttvuyys29rlu";
const TASKS_URL = "https://raw.githubusercontent.com/vasco-cell/cafe-matinal/main/tasks.json";
const PRIO = {
  urgent:{label:"Urgente",color:"#C0392B",bg:"#FDECEA",order:0},
  high:{label:"Alta",color:"#D35400",bg:"#FEF0E6",order:1},
  normal:{label:"Normal",color:"#1A5276",bg:"#EAF2FB",order:2},
  low:{label:"Baixa",color:"#1E8449",bg:"#E9F7EF",order:3},
  none:{label:"Sem prio",color:"#717D7E",bg:"#F2F3F4",order:4}
};
const QUICK = ["Resume e sugere próximo passo","Cria rascunho de email","Pesquisa info relevante","Cria alerta para amanhã","Divide em sub-tarefas"];

let allTasks = [], closed = new Set(), currentTask = null, dataSource = "demo";

const DEMO = {
  updated: new Date().toISOString(),
  tasks: [
    {id:"1",name:"Pagamentos pendentes",priority:"urgent",status:"in progress",list:"CS/CX",due:"2026-05-23",url:"https://app.clickup.com"},
    {id:"2",name:"RICO EM AÇÕES — Campanha email Feira do Livro",priority:"urgent",status:"open",list:"Operações & Tech",due:"2026-05-30",url:"https://app.clickup.com"},
    {id:"3",name:"Rever Programa Afiliados BoS",priority:"high",status:"open",list:"Operações & Tech",due:"2026-05-25",url:"https://app.clickup.com"},
    {id:"4",name:"SISTEMA DE RECOLHA DE FEEDBACK",priority:"high",status:"in progress",list:"CS/CX",due:"2026-06-01",url:"https://app.clickup.com"},
    {id:"5",name:"Atualizar Disclaimer em todo o site",priority:"normal",status:"open",list:"Operações & Tech",due:null,url:"https://app.clickup.com"},
    {id:"6",name:"Enviar newsletter Podcast",priority:"low",status:"open",list:"Recorrentes",due:"2026-05-24",url:"https://app.clickup.com"}
  ],
  calendar:[
    {id:"e1",title:"Reunião equipa BOS",time:"09:30",duration:60},
    {id:"e2",title:"Call César — estratégia email",time:"14:30",duration:30},
    {id:"e3",title:"Review campanha Feira do Livro",time:"16:00",duration:45}
  ]
};

function init() {
  const h = new Date().getHours();
  const g = h < 12 ? "Bom dia, Vasco ☀" : h < 19 ? "Boa tarde, Vasco" : "Boa noite, Vasco";
  document.getElementById("greeting").textContent = g;
  const d = new Date();
  document.getElementById("today-date").textContent = d.toLocaleDateString("pt-PT",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  loadTasks();
}

async function loadTasks() {
  try {
    const r = await fetch(TASKS_URL + "?t=" + Date.now());
    const data = await r.json();
    allTasks = data.tasks || [];
    dataSource = "real";
    renderCalendar(data.calendar || []);
    document.getElementById("source-note").textContent = "Tarefas carregadas do ClickUp · " + (data.updated||"").slice(0,16).replace("T"," ");
  } catch {
    allTasks = DEMO.tasks;
    dataSource = "demo";
    renderCalendar(DEMO.calendar);
    document.getElementById("source-note").textContent = "Dados de demonstração — as tarefas reais chegam amanhã às 08:30";
  }
  render();
}

function renderCalendar(events) {
  if (!events.length) { document.getElementById("calendar-section").innerHTML = ""; return; }
  document.getElementById("calendar-section").innerHTML = `
    <div class="section-title">Agenda de hoje</div>
    <div class="cal-grid">${events.map(e=>`
      <div class="cal-card">
        <div class="cal-time">${e.time} · ${e.duration}min</div>
        <div class="cal-title">${e.title}</div>
      </div>`).join("")}
    </div>`;
}

function isOverdue(due) { return due && new Date(due) < new Date(new Date().setHours(0,0,0,0)); }
function fmtDate(due) {
  if (!due) return null;
  const d = new Date(due), t = new Date(); t.setHours(0,0,0,0);
  const diff = Math.round((d-t)/86400000);
  if (diff < 0) return `⚠ Atrasada ${Math.abs(diff)}d`;
  if (diff === 0) return "Hoje"; if (diff === 1) return "Amanhã";
  return d.toLocaleDateString("pt-PT",{day:"2-digit",month:"short"});
}

function render() {
  const active = allTasks.filter(t => !closed.has(t.id));
  const today = new Date().toISOString().slice(0,10);
  document.getElementById("stats").innerHTML = `
    <div class="stat"><div class="stat-num" style="color:#C0392B">${active.filter(t=>t.priority==="urgent").length}</div><div class="stat-label">URGENTES</div></div>
    <div class="stat"><div class="stat-num" style="color:#D35400">${active.filter(t=>t.due===today).length}</div><div class="stat-label">PARA HOJE</div></div>
    <div class="stat"><div class="stat-num" style="color:#1A5276">${active.filter(t=>t.status==="in progress").length}</div><div class="stat-label">EM PROGRESSO</div></div>
    <div class="stat"><div class="stat-num" style="color:${active.filter(t=>isOverdue(t.due)).length>0?"#C0392B":"#1E8449"}">${active.filter(t=>isOverdue(t.due)).length}</div><div class="stat-label">ATRASADAS</div></div>`;

  const groups = Object.entries(PRIO).sort(([,a],[,b])=>a.order-b.order)
    .map(([k,cfg])=>({k,cfg,tasks:active.filter(t=>(t.priority||"none")===k)}))
    .filter(g=>g.tasks.length>0);

  document.getElementById("tasks-container").innerHTML = groups.map(({k,cfg,tasks})=>`
    <div class="group">
      <div class="group-header">
        <div class="group-dot" style="background:${cfg.color}"></div>
        <span class="group-label" style="color:${cfg.color}">${cfg.label}</span>
        <span class="group-count">${tasks.length} tarefa${tasks.length!==1?"s":""}</span>
      </div>
      ${tasks.map(t=>{
        const ds = fmtDate(t.due);
        const od = isOverdue(t.due);
        return `<div class="task-card" id="tc-${t.id}" style="border-left:3px solid ${cfg.color}">
          <div class="task-left">
            <div class="task-name"><a href="${t.url}" target="_blank">${t.name}</a></div>
            <div class="task-meta">
              <span class="badge" style="background:${cfg.bg};color:${cfg.color}">${t.list}</span>
              ${t.status?`<span class="badge" style="background:#F2F3F4;color:#555">${t.status}</span>`:""}
              ${ds?`<span class="task-date" style="color:${od?"#C0392B":"#888"};font-weight:${od?"600":"400"}">${ds}</span>`:""}
            </div>
          </div>
          <div class="task-right">
            <button class="icon-btn" title="+1 dia" onclick="delayTask(${JSON.stringify(t)})">+1d</button>
            <button class="agent-btn" onclick="openAgent(${JSON.stringify(t)})">✦ Agente</button>
            <button class="done-btn" title="Fechar" onclick="closeTask(${JSON.stringify(t)})">✓</button>
          </div>
        </div>`;}).join("")}
    </div>`).join("");
}

async function closeTask(task) {
  closed.add(task.id);
  const el = document.getElementById("tc-"+task.id);
  if (el) el.classList.add("done");
  setTimeout(()=>render(), 500);
  try { await fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"close",task_id:task.id,task_name:task.name})}); toast('✓ "'+task.name+'" fechada no ClickUp'); }
  catch { toast('✓ Fechada localmente'); }
}

async function delayTask(task) {
  try { await fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"delay",task_id:task.id,task_name:task.name,days:1})}); toast('+1 dia aplicado a "'+task.name+'"'); }
  catch { toast("Delay guardado localmente"); }
}

function openAgent(task) {
  currentTask = task;
  document.getElementById("modal-sub").textContent = task.name + " · " + task.list;
  document.getElementById("prompt-input").value = "";
  document.getElementById("ai-result-box").innerHTML = "";
  document.getElementById("chips").innerHTML = QUICK.map(q=>`<button class="chip" onclick="document.getElementById('prompt-input').value='${q}'">${q}</button>`).join("");
  document.getElementById("overlay").classList.add("active");
  setTimeout(()=>document.getElementById("prompt-input").focus(), 100);
}

function closeModal() { document.getElementById("overlay").classList.remove("active"); currentTask = null; }

async function submitAgent() {
  const p = document.getElementById("prompt-input").value.trim();
  if (!p || !currentTask) return;
  const btn = document.getElementById("submit-btn");
  btn.disabled = true; btn.textContent = "A processar...";
  document.getElementById("ai-result-box").innerHTML = '<div class="ai-result" style="color:#888">A processar... ⟳</div>';

  // Get API key from localStorage or prompt
  let apiKey = localStorage.getItem("cm_api_key");
  if (!apiKey) {
    apiKey = prompt("Anthropic API Key (guarda para futuras sessões):");
    if (!apiKey) { btn.disabled=false; btn.textContent="Executar + enviar email"; return; }
    localStorage.setItem("cm_api_key", apiKey);
  }

  try {
    const r = await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:800,
        system:"És o assistente pessoal de Vasco da Borja on Stocks / Investidor Prudente. Respondes em português europeu, de forma direta e prática.",
        messages:[{role:"user",content:`Tarefa: "${currentTask.name}" (${currentTask.list}, ${currentTask.priority}, ${currentTask.status})\n\nPedido: ${p}`}]
      })
    });
    const data = await r.json();
    const result = data.content?.find(b=>b.type==="text")?.text || "Sem resposta.";
    document.getElementById("ai-result-box").innerHTML = `<div class="ai-result">${result.replace(/\n/g,"<br>")}</div>`;
    try { await fetch(WEBHOOK,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"agent",task_id:currentTask.id,task_name:currentTask.name,prompt:p,result})}); }
    catch {}
    toast("Resultado enviado por email e adicionado ao ClickUp");
  } catch(e) {
    document.getElementById("ai-result-box").innerHTML = `<div class="ai-result" style="color:#C0392B">Erro: ${e.message}. Verifica a API key.</div>`;
    localStorage.removeItem("cm_api_key");
  }
  btn.disabled=false; btn.textContent="Executar + enviar email";
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.remove("hide");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.add("hide"), 3500);
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
init();
</script>
</body>
</html>
