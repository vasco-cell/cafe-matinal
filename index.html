      iv.current=setInterval(()=>setSec(s=>{

  const[niName,setNiName]=useState('');

  async function createFromCal(){
    if(!niName.trim()||!newItem)return;
    if(newItem.type==='tarefa'){
      const due=String(newItem.date.getTime());
      await whF({action:'create',task_name:niName,priority:niPrio});
      if(addTask)addTask({id:'l'+Date.now(),name:niName,status:'todo',priority:niPrio,list:'BBTOP20',due_date:due});

function NotificationsPanel({tasks,calEvents,habits,logs,open,onClose,setPage}){
  const n=new Date();
  const today=n.toDateString();
  const now=n.getTime();
  
  // Build notifications list
  const notifs=[];
  
  // Overdue tasks
  const overdue=tasks.filter(t=>t.status!=="done"&&t.due_date&&t.due_date!=="null"&&+t.due_date<n.setHours(0,0,0,0));
  n.setTime(now);
  if(overdue.length>0){
    notifs.push({id:"ov",type:"warning",icon:"ti-alert-triangle",color:"#E53E3E",bg:"#FFF5F5",
      title:overdue.length+" tarefa"+(overdue.length!==1?"s":"")+" em atraso",
      desc:overdue.slice(0,3).map(t=>t.name).join(", ")+(overdue.length>3?" +"+( overdue.length-3)+" mais":""),
      action:()=>{setPage("tarefas");onClose();}
    });
  }
  
  // Urgent tasks
  const urgent=tasks.filter(t=>t.status!=="done"&&t.priority==="urgent");
  if(urgent.length>0){
    notifs.push({id:"urg",type:"urgent",icon:"ti-flame",color:"#C05621",bg:"#FFFAF0",
      title:urgent.length+" tarefa"+(urgent.length!==1?"s":"")+" urgente"+(urgent.length!==1?"s":""),
      desc:urgent.slice(0,2).map(t=>t.name).join(", "),
      action:()=>{setPage("tarefas");onClose();}
    });
  }
  
  // Today's events
  const todayEvents=(calEvents||[]).filter(e=>{
    try{return new Date(e.start?.dateTime||e.start?.date).toDateString()===today;}catch{return false;}
  });
  if(todayEvents.length>0){
    notifs.push({id:"ev",type:"info",icon:"ti-calendar-event",color:"#2B6CB0",bg:"#EBF8FF",
      title:todayEvents.length+" evento"+(todayEvents.length!==1?"s":"")+" hoje",
      desc:todayEvents.map(e=>e.summary||"evento").join(", "),
      action:()=>{setPage("calendario");onClose();}
    });
  }
  
  // Tasks due today
  const dueToday=tasks.filter(t=>t.status!=="done"&&t.due_date&&t.due_date!=="null"&&new Date(+t.due_date).toDateString()===today);
  if(dueToday.length>0){
    notifs.push({id:"due",type:"today",icon:"ti-clock",color:"#D69E2E",bg:"#FFFFF0",
      title:dueToday.length+" tarefa"+(dueToday.length!==1?"s":"")+" para hoje",
      desc:dueToday.slice(0,3).map(t=>t.name).join(", "),
      action:()=>{setPage("tarefas");onClose();}
    });
  }
  
  // Habits not done today
  const tdL=(logs||{})[today]||{};
  const habitsDone=(habits||[]).filter(h=>tdL[h.id]).length;
  const habitsPending=(habits||[]).length-habitsDone;
  if(habitsPending>0&&new Date().getHours()>=9){
    notifs.push({id:"hab",type:"habit",icon:"ti-target",color:"#38A169",bg:"#F0FFF4",
      title:habitsPending+" hábito"+(habitsPending!==1?"s":"")+" por marcar hoje",
      desc:(habits||[]).filter(h=>!tdL[h.id]).map(h=>h.name).join(", "),
      action:()=>{setPage("habitos");onClose();}
    });
  }
  
  // Tasks due tomorrow
  const tom=new Date(n);tom.setDate(n.getDate()+1);
  const dueTom=tasks.filter(t=>t.status!=="done"&&t.due_date&&t.due_date!=="null"&&new Date(+t.due_date).toDateString()===tom.toDateString());
  if(dueTom.length>0){
    notifs.push({id:"tom",type:"upcoming",icon:"ti-calendar-plus",color:"#3182CE",bg:"#EBF8FF",
      title:dueTom.length+" tarefa"+(dueTom.length!==1?"s":"")+" amanhã",
      desc:dueTom.slice(0,3).map(t=>t.name).join(", "),
      action:()=>{setPage("calendario");onClose();}
    });
  }
  
  if(!open)return null;
  
  return ce("div",{style:{position:"fixed",inset:0,zIndex:1500},onClick:e=>{if(e.target===e.currentTarget)onClose();}},
    ce("div",{style:{position:"absolute",top:52,right:16,width:340,maxHeight:"80vh",background:"var(--bg-app)",borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,.2)",border:"1px solid var(--border)",overflow:"hidden",display:"flex",flexDirection:"column",animation:"fU .15s"}},
      ce("div",{style:{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"space-between"}},
        ce("div",{style:{fontSize:13,fontWeight:600,color:"var(--text-1)"}},"Notificações"+(notifs.length>0?" ("+notifs.length+")":"")),
        ce("button",{onClick:onClose,style:{border:"none",background:"transparent",cursor:"pointer",color:"var(--text-3)",fontSize:18,lineHeight:1}},"×")
      ),
      ce("div",{style:{overflowY:"auto",flex:1}},
        notifs.length===0?
          ce("div",{style:{textAlign:"center",padding:"32px 20px",color:"var(--text-3)"}},
            ce("i",{className:"ti ti-checks",style:{fontSize:32,display:"block",marginBottom:8,opacity:.4}}),
            ce("p",{style:{fontSize:13}},"Tudo em ordem!")
          ):
          notifs.map(notif=>ce("div",{key:notif.id,onClick:notif.action,
            style:{padding:"12px 16px",borderBottom:"1px solid var(--border-light)",cursor:"pointer",display:"flex",gap:10,alignItems:"flex-start",transition:"background .1s"},
            onMouseEnter:e=>e.currentTarget.style.background="var(--bg-surface)",
            onMouseLeave:e=>e.currentTarget.style.background="transparent"},
            ce("div",{style:{width:32,height:32,borderRadius:8,background:notif.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}},
              ce("i",{className:"ti "+notif.icon,style:{fontSize:16,color:notif.color}})
            ),
            ce("div",{style:{flex:1,minWidth:0}},
              ce("div",{style:{fontSize:13,fontWeight:500,color:"var(--text-1)",marginBottom:2}},notif.title),
              ce("div",{style:{fontSize:11,color:"var(--text-3)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},notif.desc)
            ),
            ce("i",{className:"ti ti-chevron-right",style:{fontSize:13,color:"var(--text-3)",marginTop:4,flexShrink:0}})
          ))
      )
    )
  );
}

function PPrevisoes({tasks,habits,logs,fin,toast}){
  var[prevs,savePrevs]=React.useState(function(){try{return JSON.parse(localStorage.getItem("bj-prevs")||"[]");}catch{return[];}});
  var[ld,setLd]=React.useState(false);
  var n=new Date();
  var MC=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
  var DIAS=["Dom","Seg","Ter","Qua","Qui","Sex","Sab"];

  function savePrevsFn(v){savePrevs(v);try{localStorage.setItem("bj-prevs",JSON.stringify(v.slice(0,10)));}catch{}}

  function gerar(){
    setLd(true);
    var act=tasks.filter(function(t){return t.status!=="done";});
    var late=act.filter(function(t){return t.due_date&&t.due_date!=="null"&&new Date(+t.due_date)<n;});
    var urg=act.filter(function(t){return t.priority==="urgent";});
    var byDue=act.filter(function(t){return t.due_date&&t.due_date!=="null";}).sort(function(a,b){return +a.due_date-+b.due_date;});
    var moKey=n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0");
    var saldo=(fin||[]).filter(function(t){return t.month===moKey;}).reduce(function(s,t){return s+(t.type==="receita"?+t.amount:-+t.amount);},0);
    var habDone=(habits||[]).filter(function(h){var dl=(logs||{})[n.toDateString()]||{};return dl[h.id];}).length;

    var dias=Array.from({length:7},function(_,i){
      var d=new Date(n);d.setDate(n.getDate()+1+i);
      var tasksDia=byDue.filter(function(t){return new Date(+t.due_date).toDateString()===d.toDateString();});
      var isWeekend=d.getDay()===0||d.getDay()===6;
      var hasUrg=tasksDia.filter(function(t){return t.priority==="urgent";}).length>0;
      var risco=hasUrg?"alto":tasksDia.length>3?"medio":isWeekend?"baixo":"baixo";
      return{
        data:DIAS[d.getDay()]+" "+d.getDate()+" "+MC[d.getMonth()],
        foco:isWeekend?"Recuperacao e planeamento":hasUrg?"Resolver urgencias":"Avanco em abertas",
        tarefas:tasksDia.slice(0,3).map(function(t){return t.name;}).concat(isWeekend?["Descanso e revisao"]:[]),
        risco:risco,
        nota:tasksDia.length===0?"Dia livre para foco profundo":tasksDia.length>2?"Dia carregado — prioriza":"Continue o ritmo"
      };
    });

    var alertas=[];
    if(late.length>0)alertas.push(late.length+" tarefa"+(late.length!==1?"s":"")+" em atraso");
    if(urg.length>0)alertas.push("Urgentes: "+urg.slice(0,2).map(function(t){return t.name;}).join(", "));
    if(saldo<0)alertas.push("Saldo mensal negativo: "+saldo.toFixed(0)+" EUR");

    var ws=new Date(n);ws.setDate(n.getDate()-n.getDay()+(n.getDay()===0?-6:1));
    var we=new Date(ws);we.setDate(ws.getDate()+6);
    var title="Previsao "+ws.getDate()+" "+MC[ws.getMonth()]+" - "+we.getDate()+" "+MC[we.getMonth()]+" "+we.getFullYear();

    var prev={id:"p"+Date.now(),title:title,created:Date.now(),resumo:"Semana com "+act.length+" tarefas abertas"+(late.length>0?", "+late.length+" atrasadas":"")+(urg.length>0?" e "+urg.length+" urgentes":"")+". Habitos: "+habDone+"/"+(habits||[]).length+".",alertas:alertas,dias:dias};
    savePrevsFn([prev].concat(prevs.slice(0,9)));
    toast&&toast("Previsao gerada!");
    setLd(false);
  }

  var[viewId,setViewId]=React.useState(null);
  var viewing=prevs.find(function(p){return p.id===viewId;});
  var RISCO_COLOR={alto:"#E53E3E",medio:"#D69E2E",baixo:"#38A169"};
  var fmtD=function(ts){return new Date(ts).toLocaleDateString("pt-PT",{day:"2-digit",month:"short"});};

  return ce("div",{style:{display:"flex",flexDirection:"column",height:"100%",animation:"fU .2s"}},
    ce("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexShrink:0}},
      ce("div",{style:{display:"flex",alignItems:"center",gap:14}},
        ce("div",{style:{width:40,height:40,borderRadius:10,background:"var(--bg-surface)",display:"flex",alignItems:"center",justifyContent:"center"}},
          ce("i",{className:"ti ti-telescope",style:{fontSize:20,color:"var(--purple)"}})),
        ce("div",null,ce("div",{className:"pt",style:{fontSize:24}},"Previsoes"),ce("div",{className:"ps"},"Um olhar sobre os proximos dias."))
      ),
      ce("button",{className:"bt dk",onClick:gerar,disabled:ld,style:{gap:5}},
        ld?ce("span",{className:"sp"}):ce("i",{className:"ti ti-sparkles",style:{fontSize:13}})," Prever 7 dias")
    ),
    viewing?ce("div",{style:{flex:1,overflowY:"auto"}},
      ce("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},
        ce("button",{className:"bt",onClick:function(){setViewId(null);},style:{gap:4}},ce("i",{className:"ti ti-arrow-left",style:{fontSize:13}}),"Voltar"),
        ce("span",{style:{fontSize:13,fontWeight:500,flex:1}},viewing.title),
        ce("button",{onClick:function(){savePrevsFn(prevs.filter(function(x){return x.id!==viewId;}));setViewId(null);},
          style:{border:"none",background:"transparent",cursor:"pointer",color:"#E53E3E"}},ce("i",{className:"ti ti-trash",style:{fontSize:16}}))
      ),
      ce("div",{className:"cd",style:{padding:16,marginBottom:12}},
        ce("p",{style:{fontSize:13,color:"var(--text-1)",lineHeight:1.7,marginBottom:10}},viewing.resumo),
        viewing.alertas&&viewing.alertas.length>0&&ce("div",{style:{display:"flex",flexDirection:"column",gap:6}},
          viewing.alertas.map(function(a,i){return ce("div",{key:i,style:{display:"flex",gap:8,alignItems:"center",padding:"6px 10px",borderRadius:7,background:"#FFF5F5",border:"1px solid #FEB2B2",fontSize:12,color:"#C53030"}},ce("i",{className:"ti ti-alert-triangle",style:{fontSize:13}}),a);})
        )
      ),
      ce("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:10}},
        (viewing.dias||[]).map(function(dia,i){
          return ce("div",{key:i,className:"cd",style:{padding:14}},
            ce("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
              ce("div",{style:{fontSize:13,fontWeight:600,color:"var(--text-1)"}},dia.data),
              ce("div",{style:{fontSize:10,padding:"2px 7px",borderRadius:10,background:RISCO_COLOR[dia.risco]+"22",color:RISCO_COLOR[dia.risco],fontWeight:600}},dia.risco)
            ),
            ce("div",{style:{fontSize:12,color:"var(--purple)",marginBottom:6,fontWeight:500}},dia.foco),
            dia.tarefas&&dia.tarefas.length>0&&ce("div",{style:{display:"flex",flexDirection:"column",gap:3}},
              dia.tarefas.map(function(t,j){return ce("div",{key:j,style:{fontSize:11,color:"var(--text-2)",padding:"2px 0",borderTop:j>0?"1px solid var(--border-light)":"none"}},t);})
            ),
            dia.nota&&ce("div",{style:{marginTop:6,fontSize:11,color:"var(--text-3)",fontStyle:"italic"}},dia.nota)
          );
        })
      )
    ):ce("div",{style:{flex:1,overflowY:"auto"}},
      prevs.length===0?ce("div",{style:{textAlign:"center",padding:"60px 20px",color:"var(--text-3)"}},
        ce("i",{className:"ti ti-telescope",style:{fontSize:40,display:"block",marginBottom:12,opacity:.3}}),
        ce("p",{style:{fontSize:14,marginBottom:4}},"Sem previsoes ainda."),
        ce("p",{style:{fontSize:12}},"A IA analisa as tuas tarefas, habitos e financas para gerar uma previsao personalizada."),
        ce("button",{className:"bt dk",onClick:gerar,style:{marginTop:16,gap:5}},ce("i",{className:"ti ti-sparkles",style:{fontSize:13}})," Gerar primeira previsao")
      ):
      ce("div",{style:{display:"flex",flexDirection:"column",gap:8}},
        prevs.map(function(prev){return ce("div",{key:prev.id,className:"cd",style:{padding:"14px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12},
          onClick:function(){setViewId(prev.id);}},
          ce("div",{style:{flex:1}},
            ce("div",{style:{fontSize:14,fontWeight:500,color:"var(--text-1)",marginBottom:3}},prev.title),
            ce("div",{style:{fontSize:11,color:"var(--text-3)"}},fmtD(prev.created))
          ),
          ce("i",{className:"ti ti-chevron-right",style:{fontSize:14,color:"var(--text-3)"}}),
          ce("button",{onClick:function(e){e.stopPropagation();savePrevsFn(prevs.filter(function(x){return x.id!==prev.id;}));},

  async function genBrief(ts){
    const dk=new Date().toDateString();
    // Check localStorage first to avoid sending email on every page refresh
    const lsCache=localStorage.getItem("bj-brief-sent");
    if(lsCache===dk)return; // Already sent today
    const cached=await sg('bj-brief');
    if(cached&&cached.date===dk){setDailyBrief(cached);localStorage.setItem("bj-brief-sent",dk);return;}
    const now=new Date();
    const parts=(ts||[]).slice(0,20).map(function(t){
      var late=t.due_date&&t.due_date!=='null'&&(new Date(+t.due_date))<now;
      var tod=t.due_date&&t.due_date!=='null'&&(new Date(+t.due_date)).toDateString()===now.toDateString();
      return t.name+' ['+t.priority+']'+(late?' ATRASADA':tod?' HOJE':'');
    }).join('; ');
    var dateStr=now.toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});
    var prompt='Hoje '+dateStr+'. Tarefas do Vasco BBTOP20: '+parts
      +'. Responde APENAS em JSON sem markdown: {"top3":[{"name":"x","reason":"y"}],"motivacao":"z"}';
    var res=await aiC([{role:'user',content:prompt}],'Assistente BBTOP20 pt-pt. So JSON.',500);
    try{
      var clean=res.replace(/```json|```/g,'').trim();
      var b=Object.assign(JSON.parse(clean),{date:dk});
      setDailyBrief(b);ss('bj-brief',b);
    }catch(e){}
  }
